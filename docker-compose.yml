name: school-mgmt

services:
  db:
    image: postgres:16-alpine
    container_name: school-mgmt-db
    environment:
      POSTGRES_DB: school_mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed_db/tables.sql:/docker-entrypoint-initdb.d/01-tables.sql:ro
      - ./seed_db/seed-db.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./seed_db/demo-data.sql:/docker-entrypoint-initdb.d/03-demo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school_mgmt"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - school-mgmt-network

  backend:
    image: school-mgmt-backend:latest
    container_name: school-mgmt-backend
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5007
      DATABASE_URL: postgresql://postgres:postgres@db:5432/school_mgmt
      JWT_ACCESS_TOKEN_SECRET: dev_access_secret
      JWT_REFRESH_TOKEN_SECRET: dev_refresh_secret
      CSRF_TOKEN_SECRET: dev_csrf_secret
      JWT_ACCESS_TOKEN_TIME_IN_MS: 900000
      JWT_REFRESH_TOKEN_TIME_IN_MS: 28800000
      CSRF_TOKEN_TIME_IN_MS: 950000
      EMAIL_VERIFICATION_TOKEN_SECRET: dev_email_secret
      EMAIL_VERIFICATION_TOKEN_TIME_IN_MS: 18000000
      PASSWORD_SETUP_TOKEN_SECRET: dev_pwd_setup_secret
      PASSWORD_SETUP_TOKEN_TIME_IN_MS: 300000
      MAIL_FROM_USER: noreply@school.local
      RESEND_API_KEY: re_dev_placeholder
      UI_URL: http://localhost:5173
      API_URL: http://localhost:5007
      COOKIE_DOMAIN: localhost
      NODE_ENV: production
    ports:
      - "5007:5007"
    networks:
      - school-mgmt-network

  frontend:
    image: school-mgmt-frontend:latest
    container_name: school-mgmt-frontend
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5007
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - school-mgmt-network

  go-service:
    image: school-mgmt-go-service:latest
    container_name: school-mgmt-go-service
    build:
      context: ./Go-service
    depends_on:
      - backend
    environment:
      PORT: "80"
      BACKEND_BASE_URL: http://backend:5007
      BACKEND_ADMIN_USERNAME: admin@school-admin.com
      BACKEND_ADMIN_PASSWORD: 3OU4zn3q6Zh9
      OUTPUT_DIR: /app/output
      REQUEST_TIMEOUT: 8s
      LOGIN_TIMEOUT: 5s
      BREAKER_INTERVAL: 30s
      BREAKER_TIMEOUT: 20s
      SHUTDOWN_TIMEOUT: 15s
      LOG_LEVEL: info
    ports:
      - "8080:80"
    volumes:
      - go-service-pdf:/app/output
    networks:
      - school-mgmt-network

volumes:
  pgdata:
    name: school-mgmt-pgdata
  go-service-pdf:
    name: school-mgmt-go-pdf

networks:
  school-mgmt-network:
    name: school-mgmt-network
    driver: bridge
